name: Notify Frontend
on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Trigger frontend
        env:
          GH_TOKEN: ${{ secrets.FRONTEND_DISPATCH_TOKEN }}
        run: |
          DIFF=$(git diff HEAD~1 HEAD | head -c 50000)
          MSG=$(git log -1 --pretty=%s)
          gh workflow run sync-frontend.yml \
            --repo sql-onlinejudge/soj-frontend \
            -f "diff=$DIFF" \
            -f "commit_message=$MSG"